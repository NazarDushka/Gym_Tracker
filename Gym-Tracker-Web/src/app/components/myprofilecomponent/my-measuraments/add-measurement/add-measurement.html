<div class="add-measurement-form-container">
  
  <h2>Add {{ typeName || 'Measurement' }}</h2>

  <form [formGroup]="measurementForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date" />
    </div>

    <div class="form-group">
      <label for="value">
        Value 
        @if (unit) {
          <span class="unit-badge">({{ unit }})</span>
        }
      </label>
      <input type="number" id="value" formControlName="value" placeholder="0.0" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="measurementForm.invalid">Save</button>
    </div>

  </form>
</div>
