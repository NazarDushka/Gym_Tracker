name: Build, Test and Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '8.0.x'
  ACR_NAME: GymTracker20260531234352
  IMAGE_NAME: myTracker
  RESOURCE_GROUP: Tracker
  CONTAINER_APP_NAME: gymtracker-app-20260531234016
  BACKEND_PATH: ./GymTrackerBack

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./GymTrackerBack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ github.sha }}
      acr-name-lower: ${{ steps.vars.outputs.acr_name_lower }}
      image-name-lower: ${{ steps.vars.outputs.image_name_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker требует репозиторий/тег строго в нижнем регистре,
      # даже если имя ACR в Azure создано с заглавными буквами
      - name: Normalize names to lowercase
        id: vars
        run: |
          echo "acr_name_lower=$(echo '${{ env.ACR_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_name_lower=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ steps.vars.outputs.acr_name_lower }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_PATH }}
          push: true
          tags: ${{ steps.vars.outputs.acr_name_lower }}.azurecr.io/${{ steps.vars.outputs.image_name_lower }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new image to Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ needs.build-and-push.outputs.acr-name-lower }}.azurecr.io/${{ needs.build-and-push.outputs.image-name-lower }}:${{ needs.build-and-push.outputs.image-tag }}
